spring:
  application:
    name: account-service
  datasource:
    url: jdbc:h2:mem:accountdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: false
  h2:
    console:
      enabled: true
      path: /h2-console
server:
  port: 8081
internal:
  # Shared secret that the Event Service must present on /accounts/** calls. The Account Service is
  # internal-only, so requests without this key are rejected with 401. Hard-coded for this take-home;
  # a real deployment would source it from a secrets manager (or use mTLS) and never commit it.
  api-key: local-internal-api-key
management:
  endpoints:
    web:
      base-path: /
      exposure:
        include: health
      discovery:
        enabled: false
  endpoint:
    health:
      show-details: always
logging:
  structured:
    format:
      console: ecs
  level:
    com.ledger: INFO
